services:
  pitcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pitcher-pro
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PORT:-8080}:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pitcher-backend
    restart: unless-stopped
